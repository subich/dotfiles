# Terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB:clipboard:hyperlinks:osc7"
set -g allow-passthrough on
set -g focus-events on
set -g set-clipboard on

# General behavior
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g mode-keys vi
set -g status-keys vi
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S — #W"
set -g status-interval 5
set -g status-position top

# Navigate panes with Vim keys after the prefix.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navigate panes from the home row without the prefix. Alt-arrows remain as
# transition bindings until Alt-h/j/k/l becomes habitual.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Select windows without the prefix.
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Create windows and panes in the current working directory.
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Directional splits: prefix C-d, then h/j/k/l.
# Prefix d remains the default detach-client binding.
bind C-d switch-client -T split
bind -T split h split-window -h -b -c "#{pane_current_path}"
bind -T split l split-window -h -c "#{pane_current_path}"
bind -T split k split-window -v -b -c "#{pane_current_path}"
bind -T split j split-window -v -c "#{pane_current_path}"

# Modal pane resizing: prefix r, then h/j/k/l. Uppercase moves farther.
bind r switch-client -T resize
bind -T resize h resize-pane -L 10 \; switch-client -T resize
bind -T resize j resize-pane -D 10 \; switch-client -T resize
bind -T resize k resize-pane -U 10 \; switch-client -T resize
bind -T resize l resize-pane -R 10 \; switch-client -T resize
bind -T resize H resize-pane -L 30 \; switch-client -T resize
bind -T resize J resize-pane -D 30 \; switch-client -T resize
bind -T resize K resize-pane -U 30 \; switch-client -T resize
bind -T resize L resize-pane -R 30 \; switch-client -T resize
bind -T resize Escape switch-client -T root

# Project/session switching and short-lived tools.
bind f display-popup -d "#{pane_current_path}" -w 80% -h 70% -E "~/.config/tmux/sessionizer"
bind g display-popup -d "#{pane_current_path}" -w 95% -h 95% -E "lazygit"
bind t display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "${SHELL} -l"
bind T clock-mode

# Reload this configuration.
bind R source-file "~/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

# Vi-style copy mode. Copied text is forwarded to Ghostty via OSC 52.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Plugins
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "tmux-plugins/tpm"

# Restore sessions and programs, but never persist pane scrollback contents.
set -g @resurrect-capture-pane-contents "off"
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"

# Theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
run "~/.config/tmux/themes/catppuccin/catppuccin.tmux"

# Keep the status line focused on workspace context rather than system metrics.
set -g status-right-length 120
set -g status-left-length 20
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Initialize TPM after all plugin declarations.
run "~/.config/tmux/plugins/tpm/tpm"
