# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

set -as terminal-features "*:RGB"              # Advertise 24-bit truecolor support to all terminals
set -as terminal-features "*:clipboard"        # Advertise OSC 52 clipboard support to all terminals
set -as terminal-features "*:hyperlinks"       # Advertise OSC 8 hyperlink support to all terminals
set -as terminal-features "*:osc7"             # Advertise OSC 7 working-directory reporting to all terminals

set -g allow-passthrough on                    # Pass OSC sequences (notifications, clipboard, etc.) through to the terminal
set -g base-index 1                            # start indexing windows at 1 instead of 0
set -g clock-mode-style 12                     # set clock mode (leader-t) to 12 hour time
set -g detach-on-destroy off                   # don't exit from tmux when closing a session
set -g escape-time 0                           # zero-out escape time delay
set -g focus-events on                         # Forward terminal focus in/out events to apps running inside tmux
set -g history-limit 1000000                   # increase history size (from 2,000)
set -g mode-keys vi                            # vi-like copy mode
set -g renumber-windows on                     # renumber all windows when any window is closed
set -g set-clipboard on                        # use system clipboard
set -g status-interval 2                       # update every 2 seconds
set -g status-position top                     # macOS / darwin style


# toggle panes with Vim shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch windows using Alt-number without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# reload config file (moved to R since prefix r now activates the resize table)
bind R source-file "~/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

# use current path when opening new pane
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Directional splits (mirror Ghostty's super+d > direction grammar)
# prefix C-d enters the "split" table (prefix d stays as the default detach-client);
# the next h/j/k/l chooses direction
bind C-d switch-client -T split
bind -T split h split-window -h -b -c "#{pane_current_path}"   # new split to the left
bind -T split l split-window -h    -c "#{pane_current_path}"   # new split to the right
bind -T split k split-window -v -b -c "#{pane_current_path}"   # new split above
bind -T split j split-window -v    -c "#{pane_current_path}"   # new split below

# Resize modal table (mirror Ghostty's super+r resize table)
# prefix r enters the "resize" table; h/j/k/l resize repeatedly until escape
bind r switch-client -T resize
bind -T resize h resize-pane -L 10 \; switch-client -T resize
bind -T resize j resize-pane -D 10 \; switch-client -T resize
bind -T resize k resize-pane -U 10 \; switch-client -T resize
bind -T resize l resize-pane -R 10 \; switch-client -T resize
bind -T resize escape switch-client -T root

# vi-style copy-mode selection (aligns with mode-keys vi and Ghostty's super+c copy)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

#install plugins
set -g @plugin "tmux-plugins/tmux-cpu"
set -g @plugin "tmux-plugins/tmux-battery"

set -g @plugin "tmux-plugins/tpm"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run "~/.config/tmux/themes/catppuccin/catppuccin.tmux"

# Configure top bar
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.config/tmux/plugins/tpm/tpm"
